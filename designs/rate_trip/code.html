<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Mock Background Page (Restricted Navigation Suppression per UX Goal) -->
<main class="flex-grow flex flex-col items-center justify-center p-container-margin relative overflow-hidden">
<!-- Background Animation -->

<div class="max-w-[1200px] w-full grid grid-cols-1 md:grid-cols-12 gap-gutter opacity-40 pointer-events-none">

</div>

</button>

</button>

<script>
        // Star Rating Interaction Logic
        const stars = document.querySelectorAll('.star-btn');
        let currentRating = 0;

        stars.forEach((star, index) => {
            star.addEventListener('mouseenter', () => {
                highlightStars(index + 1);
            });

            star.addEventListener('mouseleave', () => {
                highlightStars(currentRating);
            });

            star.addEventListener('click', () => {
                currentRating = index + 1;
                highlightStars(currentRating);
                console.log(`Rating selected: ${currentRating}`);
            });
        });

        function highlightStars(count) {
            stars.forEach((star, index) => {
                const icon = star.querySelector('.material-symbols-outlined');
                if (index < count) {
                    icon.classList.add('star-active');
                    icon.style.fontVariationSettings = "'FILL' 1";
                } else {
                    icon.classList.remove('star-active');
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });
        }

        // Submit Button Interaction
        const submitBtn = document.getElementById('submit-review');
        submitBtn.addEventListener('click', () => {
            const comment = document.getElementById('review-comment').value;
            if (currentRating === 0) {
                alert('Please select a star rating first!');
                return;
            }
            
            // Visual feedback
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Sending...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            setTimeout(() => {
                const modal = document.getElementById('review-modal');
                modal.classList.add('opacity-0');
                setTimeout(() => {
                    modal.style.display = 'none';
                    alert(`Thank you! You rated Alex ${currentRating} stars.`);
                }, 300);
            }, 1200);
        });

        // Atmospheric micro-interaction for background
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const modal = document.querySelector('#review-modal > div');
            if(modal) {
                modal.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
